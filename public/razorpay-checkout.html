<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Razorpay Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 32px;
      }

      button {
        background: #0f766e;
        border: 0;
        color: white;
        cursor: pointer;
        padding: 12px 18px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      #result {
        border: 1px solid #d1d5db;
        margin-top: 20px;
        max-width: 720px;
        padding: 16px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <button id="pay-now" type="button">Pay Now</button>
    <div id="result">Ready for payment.</div>

    <script>
      const API_BASE_URL = `${window.location.origin}/api/payments`;
      const orderId = new URLSearchParams(window.location.search).get("orderId");
      const payNowButton = document.getElementById("pay-now");
      const resultBox = document.getElementById("result");

      const showResult = (message, data) => {
        resultBox.textContent = data
          ? `${message}\n\n${JSON.stringify(data, null, 2)}`
          : message;
      };

      payNowButton.addEventListener("click", async () => {
        if (!orderId) {
          showResult("Please open this page with ?orderId=YOUR_MONGODB_ORDER_ID");
          return;
        }

        if (!window.Razorpay) {
          showResult("Razorpay checkout script is not loaded. Check internet connection or browser extensions.");
          return;
        }

        payNowButton.disabled = true;
        showResult("Creating Razorpay order...");

        try {
          const createOrderResponse = await fetch(`${API_BASE_URL}/razorpay/create-order`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ orderId })
          });

          const createOrderResult = await createOrderResponse.json();

          if (!createOrderResponse.ok) {
            showResult(createOrderResult.message || "Unable to start payment", createOrderResult);
            return;
          }

          const { keyId, razorpayOrder } = createOrderResult.data;

          showResult("Opening Razorpay checkout...");

          const checkout = new Razorpay({
            key: keyId,
            amount: razorpayOrder.amount,
            currency: razorpayOrder.currency,
            name: "Restaurant Ordering",
            description: "Order payment",
            order_id: razorpayOrder.id,
            method: {
              upi: true,
              card: true,
              netbanking: true,
              wallet: true,
              emandate: false,
              paylater: true
            },
            handler: async (response) => {
              showResult("Verifying payment...");

              const verifyResponse = await fetch(`${API_BASE_URL}/razorpay/verify`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(response)
              });

              const verifyResult = await verifyResponse.json();

              if (!verifyResponse.ok) {
                showResult(verifyResult.message || "Payment verification failed", verifyResult);
                return;
              }

              showResult("Payment successful", verifyResult);
            },
            modal: {
              ondismiss: () => {
                showResult("Payment popup closed before completion.");
              }
            },
            theme: {
              color: "#0f766e"
            }
          });

          checkout.on("payment.failed", (response) => {
            console.error("Payment failed:", response.error);
            showResult("Payment failed", response.error);
          });

          checkout.on("payment.authorized", (response) => {
            console.log("Payment authorized:", response);
          });

          checkout.open();
        } catch (error) {
          showResult(error.message || "Something went wrong while starting payment.");
        } finally {
          payNowButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
